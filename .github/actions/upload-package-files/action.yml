name: "Upload Package Files"
description: "Uploads package archive to pre-signed URLs"

inputs:
  archive-path:
    description: "Path to the package archive"
    required: true
  client-upload-url:
    description: "Pre-signed URL for client upload"
    required: true
  server-upload-url:
    description: "Pre-signed URL for server upload"
    required: true
  config-path:
    description: "Path to config.json file (optional)"
    required: false
  metadata-upload-url:
    description: "Pre-signed URL for metadata upload (optional)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Upload to client URL
      shell: bash
      env:
        ARCHIVE_PATH: ${{ inputs.archive-path }}
        UPLOAD_URL: ${{ inputs.client-upload-url }}
      run: |
        if [ ! -f "$ARCHIVE_PATH" ]; then
          echo "❌ Error: Archive file not found: $ARCHIVE_PATH"
          exit 1
        fi

        echo "📤 Uploading to client URL..."

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X PUT \
          -H "Content-Type: application/gzip" \
          --data-binary "@$ARCHIVE_PATH" \
          "$UPLOAD_URL")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ Error: Failed to upload to client URL (HTTP $HTTP_CODE)"
          exit 1
        fi

        echo "✅ Client upload successful"

    - name: Upload to server URL
      shell: bash
      env:
        ARCHIVE_PATH: ${{ inputs.archive-path }}
        UPLOAD_URL: ${{ inputs.server-upload-url }}
      run: |
        if [ ! -f "$ARCHIVE_PATH" ]; then
          echo "❌ Error: Archive file not found: $ARCHIVE_PATH"
          exit 1
        fi

        echo "📤 Uploading to server URL..."

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X PUT \
          -H "Content-Type: application/gzip" \
          --data-binary "@$ARCHIVE_PATH" \
          "$UPLOAD_URL")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ Error: Failed to upload to server URL (HTTP $HTTP_CODE)"
          exit 1
        fi

        echo "✅ Server upload successful"

    - name: Upload config.json to metadata URL
      shell: bash
      env:
        CONFIG_PATH: ${{ inputs.config-path }}
        UPLOAD_URL: ${{ inputs.metadata-upload-url }}
      run: |
        # Skip if no config or upload URL
        if [ -z "$CONFIG_PATH" ] || [ -z "$UPLOAD_URL" ]; then
          echo "ℹ️  No metadata to upload (config or URL not provided)"
          exit 0
        fi

        if [ ! -f "$CONFIG_PATH" ]; then
          echo "❌ Error: Config file not found: $CONFIG_PATH"
          exit 1
        fi

        echo "📤 Uploading config.json to metadata URL..."

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X PUT \
          -H "Content-Type: application/json" \
          --data-binary "@$CONFIG_PATH" \
          "$UPLOAD_URL")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ Error: Failed to upload config.json (HTTP $HTTP_CODE)"
          exit 1
        fi

        echo "✅ Config.json upload successful"
