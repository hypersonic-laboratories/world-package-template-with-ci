name: "Update Package Version"
description: "Updates an existing package version via API using metadata.json and the files[] contract"

inputs:
  api-url:
    description: "API base URL"
    required: true
  api-token:
    description: "API authentication token"
    required: true
  archive-path:
    description: "Path to the package archive"
    required: true
  archive-size:
    description: "Size of the archive in bytes"
    required: true
  archive-xxh3:
    description: "xxh3 (64-bit) hash of the archive as lowercase hex"
    required: true

outputs:
  version-id:
    description: "Updated version ID"
    value: ${{ steps.update-version.outputs.version-id }}
  package-id:
    description: "Package ID"
    value: ${{ steps.update-version.outputs.package-id }}
  upload-plan-path:
    description: "Path to a JSON file containing the response files[] (upload URLs, multipart parts, sizes)"
    value: ${{ steps.update-version.outputs.upload-plan-path }}
  config-path:
    description: "Path to configFile.json at repo root (if present and non-empty)"
    value: ${{ steps.detect-config-file.outputs.config-path }}
  metadata-size:
    description: "Size of configFile.json in bytes (if present)"
    value: ${{ steps.detect-config-file.outputs.metadata-size }}

runs:
  using: "composite"
  steps:
    - name: Read metadata
      id: read-metadata
      shell: bash
      run: |
        if [ ! -f "metadata.json" ]; then
          echo "❌ Error: metadata.json not found"
          exit 1
        fi

        VERSION_ID=$(jq -r '.id' metadata.json)
        PACKAGE_ID=$(jq -r '.package.id' metadata.json)

        if [ "$VERSION_ID" = "null" ] || [ -z "$VERSION_ID" ]; then
          echo "❌ Error: id not found in metadata.json"
          exit 1
        fi

        if [ "$PACKAGE_ID" = "null" ] || [ -z "$PACKAGE_ID" ]; then
          echo "❌ Error: package.id not found in metadata.json"
          exit 1
        fi

        echo "version-id=$VERSION_ID" >> $GITHUB_OUTPUT
        echo "package-id=$PACKAGE_ID" >> $GITHUB_OUTPUT
        echo "✅ Package Version ID: $VERSION_ID"
        echo "✅ Package ID: $PACKAGE_ID"

    - name: Detect configFile.json
      id: detect-config-file
      shell: bash
      run: |
        # configFile.json at repo root is the "metadata" asset uploaded alongside content.
        # It is optional; when missing (or empty) we simply omit the metadata file entry.
        if [ -f "configFile.json" ] && [ -s "configFile.json" ]; then
          CONFIG_FILE_SIZE=$(stat -c%s "configFile.json" 2>/dev/null || stat -f%z "configFile.json" 2>/dev/null)

          if [ -z "$CONFIG_FILE_SIZE" ] || [ "$CONFIG_FILE_SIZE" -eq 0 ]; then
            echo "❌ Error: could not determine configFile.json size"
            ls -lh configFile.json
            exit 1
          fi

          echo "config-path=configFile.json" >> $GITHUB_OUTPUT
          echo "metadata-size=$CONFIG_FILE_SIZE" >> $GITHUB_OUTPUT
          echo "has-config-file=true" >> $GITHUB_OUTPUT
          echo "✅ configFile.json detected ($CONFIG_FILE_SIZE bytes) — will upload as metadata"
        else
          echo "ℹ️  No configFile.json at repo root — skipping metadata file entry"
          echo "config-path=" >> $GITHUB_OUTPUT
          echo "metadata-size=0" >> $GITHUB_OUTPUT
          echo "has-config-file=false" >> $GITHUB_OUTPUT
        fi

    - name: Update package version
      id: update-version
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        API_TOKEN: ${{ inputs.api-token }}
        VERSION_ID: ${{ steps.read-metadata.outputs.version-id }}
        PACKAGE_ID: ${{ steps.read-metadata.outputs.package-id }}
        ARCHIVE_SIZE: ${{ inputs.archive-size }}
        ARCHIVE_XXH3: ${{ inputs.archive-xxh3 }}
        METADATA_SIZE: ${{ steps.detect-config-file.outputs.metadata-size }}
        HAS_CONFIG_FILE: ${{ steps.detect-config-file.outputs.has-config-file }}
      run: |
        # files[] always contains a "content" entry with xxh3. A "metadata" entry is
        # appended only when configFile.json exists at the repo root.
        if [ "$HAS_CONFIG_FILE" = "true" ]; then
          FILES_JSON=$(jq -n \
            --argjson contentSize "$ARCHIVE_SIZE" \
            --arg xxh3 "$ARCHIVE_XXH3" \
            --argjson metadataSize "$METADATA_SIZE" \
            '[
              {key: "content",  size: $contentSize,  metadata: {xxh3: $xxh3}},
              {key: "metadata", size: $metadataSize, metadata: {}}
            ]')
        else
          FILES_JSON=$(jq -n \
            --argjson contentSize "$ARCHIVE_SIZE" \
            --arg xxh3 "$ARCHIVE_XXH3" \
            '[
              {key: "content", size: $contentSize, metadata: {xxh3: $xxh3}}
            ]')
        fi

        # The PATCH body's `config` field (the version's stored config object) is
        # independent of the metadata asset file — we still read it from metadata.json
        # when present, for backward compatibility.
        if [ "$(jq -r '.config // null' metadata.json)" != "null" ]; then
          CONFIG_OBJECT=$(jq -c '.config' metadata.json)
          PAYLOAD=$(jq -n \
            --argjson files "$FILES_JSON" \
            --argjson config "$CONFIG_OBJECT" \
            '{files: $files, config: $config}')
        else
          PAYLOAD=$(jq -n --argjson files "$FILES_JSON" '{files: $files}')
        fi

        echo "📤 Updating package version..."
        echo "🌐 Endpoint: PATCH $API_URL/api/v1/package-versions/$VERSION_ID"
        echo "Payload: $PAYLOAD"

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X PATCH \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $API_TOKEN" \
          -d "$PAYLOAD" \
          "$API_URL/api/v1/package-versions/$VERSION_ID")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        echo "HTTP Status: $HTTP_CODE"

        if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
          echo "❌ Error: Failed to update package version (HTTP $HTTP_CODE)"
          echo "Response: $BODY"
          exit 1
        fi

        UPDATED_VERSION_ID=$(echo "$BODY" | jq -r '.item.id')
        if [ "$UPDATED_VERSION_ID" = "null" ] || [ -z "$UPDATED_VERSION_ID" ]; then
          echo "❌ Error: Failed to parse version ID from response"
          echo "Response: $BODY"
          exit 1
        fi

        # Persist the files[] response (upload URLs / multipart parts) for the upload step.
        UPLOAD_PLAN_PATH="upload-plan.json"
        echo "$BODY" | jq '.item.files' > "$UPLOAD_PLAN_PATH"

        if [ ! -s "$UPLOAD_PLAN_PATH" ] || [ "$(jq 'length' "$UPLOAD_PLAN_PATH")" = "0" ]; then
          echo "❌ Error: Response did not include a files[] array"
          echo "Response: $BODY"
          exit 1
        fi

        echo "version-id=$UPDATED_VERSION_ID" >> $GITHUB_OUTPUT
        echo "package-id=$PACKAGE_ID" >> $GITHUB_OUTPUT
        echo "upload-plan-path=$UPLOAD_PLAN_PATH" >> $GITHUB_OUTPUT

        echo "✅ Package version updated: $UPDATED_VERSION_ID"
        echo "✅ Upload plan written to $UPLOAD_PLAN_PATH"
        jq -r '.[] | "   • \(.key) (\(.size) bytes) — \(if .uploadUrl then "single upload" else "multipart (\(.uploadMultipartUrls | length) parts)" end)"' "$UPLOAD_PLAN_PATH"
