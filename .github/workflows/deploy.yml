name: Deploy Package

on:
  push:
    branches:
      - main # Change this to your preferred branch name
  workflow_dispatch:
    inputs:
      apiUrl:
        description: "Override API URL for this run (leave blank to use repo variable API_URL)"
        required: false
        type: string

env:
  API_URL: ${{ inputs.apiUrl || vars.API_URL }}
  API_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate API URL
        run: |
          if [ -z "${API_URL:-}" ]; then
            echo "::error::API_URL is not set. Configure a repository variable named 'API_URL' at Settings → Secrets and variables → Actions → Variables, or supply it as the 'apiUrl' input when running the workflow manually."
            exit 1
          fi
          echo "🌐 Using API: $API_URL"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create package archive
        id: create-archive
        uses: ./.github/actions/create-package-archive

      - name: Update package version
        id: create-version
        uses: ./.github/actions/create-package-version
        with:
          api-url: ${{ env.API_URL }}
          api-token: ${{ env.API_TOKEN }}
          archive-path: ${{ steps.create-archive.outputs.archive-path }}
          archive-size: ${{ steps.create-archive.outputs.archive-size }}
          archive-xxh3: ${{ steps.create-archive.outputs.archive-xxh3 }}

      - name: Upload package files
        uses: ./.github/actions/upload-package-files
        with:
          api-url: ${{ env.API_URL }}
          api-token: ${{ env.API_TOKEN }}
          version-id: ${{ steps.create-version.outputs.version-id }}
          upload-plan-path: ${{ steps.create-version.outputs.upload-plan-path }}
          archive-path: ${{ steps.create-archive.outputs.archive-path }}
          config-path: ${{ steps.create-version.outputs.config-path }}

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Package version updated successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Version ID**: ${{ steps.create-version.outputs.version-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package ID**: ${{ steps.create-version.outputs.package-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Archive Size**: ${{ steps.create-archive.outputs.archive-size }} bytes" >> $GITHUB_STEP_SUMMARY
